name: Build Android aarch64 JNI

on:
  push:
  pull_request:

jobs:
  build-android-aarch64:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@main

    - name: Set up JDK 25
      uses: actions/setup-java@main
      with:
        java-version: '25'
        distribution: 'temurin'

    # ==================== 1. 设置 ccache ====================
    - name: Set up ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: 'android-aarch64-rocksdb'
        max-size: '5G'

    # ==================== 2. 编译 zstd 动态库 (Android aarch64) ====================
    - name: Build zstd for Android aarch64
      run: |
        git clone --depth 1 https://github.com/facebook/zstd.git
        cd zstd
        mkdir build && cd build
        
        cmake ../build/cmake \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-26 \
          -DCMAKE_INSTALL_PREFIX=${PWD}/../install \
          -DZSTD_BUILD_STATIC=OFF \
          -DZSTD_BUILD_SHARED=ON
        
        cmake --build . --parallel 6
        cmake --install .

    # ==================== 3. 编译 RocksDB JNI (使用 ccache + 静态链接 zstd) ====================
    - name: Build RocksDB JNI for Android aarch64
      run: |
        # 让 CMake 使用 ccache 包装的编译器
        export PATH="/usr/lib/ccache:$PATH"
        
        mkdir -p build-android-aarch64 && cd build-android-aarch64
        
        export TOOLCHAIN=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64
        export TARGET=aarch64-linux-android
        export API=26
        
        export AR=$TOOLCHAIN/bin/llvm-ar
        export CC="$TOOLCHAIN/bin/${TARGET}${API}-clang"
        export CXX="$TOOLCHAIN/bin/${TARGET}${API}-clang++"
        export LD=$TOOLCHAIN/bin/ld
        export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
        export STRIP=$TOOLCHAIN/bin/llvm-strip
        
        # 显式指定 zstd 路径（刚刚编译好的动态库）
        export ZSTD_DIR=${GITHUB_WORKSPACE}/zstd/install
        export ZSTD_LIBRARIES=$ZSTD_DIR/lib/libzstd.so
        export ZSTD_INCLUDE_DIRS=$ZSTD_DIR/include
        
        cmake \
          -DCMAKE_SYSTEM_NAME=Android \
          -DCMAKE_SYSTEM_VERSION=$API \
          -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
          -DCMAKE_ANDROID_NDK=$ANDROID_NDK_LATEST_HOME \
          -DCMAKE_ANDROID_STL_TYPE=c++_static \
          -DCMAKE_C_COMPILER="$CC" \
          -DCMAKE_CXX_COMPILER="$CXX" \
          -DCMAKE_C_FLAGS="-fPIC -O3 -mllvm -polly" \
          -DCMAKE_CXX_FLAGS="-fPIC -O3 -mllvm -polly" \
          -DZSTD_LIBRARIES="$ZSTD_LIBRARIES" \
          -DZSTD_INCLUDE_DIRS="$ZSTD_INCLUDE_DIRS" \
          -DJNI=ON \
          -DROCKSDB_BUILD_SHARED=ON \
          -DWITH_GFLAGS=OFF \
          -DWITH_SNAPPY=OFF \
          -DWITH_LZ4=OFF \
          -DWITH_ZLIB=OFF \
          -DWITH_ZSTD=ON \
          -DROCKSDB_DISABLE_ZSTD=0 \
          -DCMAKE_BUILD_TYPE=Release \
          ..
        
        cmake --build . --config Release --parallel 6

    # ==================== 4. 上传产物 ====================
    - name: Archive artifacts
      uses: actions/upload-artifact@main
      with:
        name: rocksdb-android-aarch64-jni
        path: |
          **/libzstd.so
          **/librocksdb.so
          **/librocksdbjni.so
        retention-days: 7
