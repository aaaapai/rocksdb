name: Build Android aarch64 JNI

on:
  push:
  pull_request:

jobs:
  build-android-aarch64:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@main
    
    - name: Set up JDK 25
      uses: actions/setup-java@main
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Build RocksDB JNI for Android aarch64
      run: |
        # 创建构建目录
        mkdir -p build-android-aarch64 && cd build-android-aarch64
        
        # 设置交叉编译工具链
        export TOOLCHAIN=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64
        export TARGET=aarch64-linux-android
        export API=26
        
        # 设置编译器和标志
        export AR=$TOOLCHAIN/bin/llvm-ar
        export CC=$TOOLCHAIN/bin/${TARGET}${API}-clang
        export CXX=$TOOLCHAIN/bin/${TARGET}${API}-clang++
        export LD=$TOOLCHAIN/bin/ld
        export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
        export STRIP=$TOOLCHAIN/bin/llvm-strip
        
        # 使用 CMake 配置
        cmake \
          -DCMAKE_SYSTEM_NAME=Android \
          -DCMAKE_SYSTEM_VERSION=$API \
          -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
          -DCMAKE_ANDROID_NDK=$ANDROID_NDK_LATEST_HOME \
          -DCMAKE_ANDROID_STL_TYPE=c++_static \
          -DCMAKE_C_COMPILER=$CC \
          -DCMAKE_CXX_COMPILER=$CXX \
          -DCMAKE_C_FLAGS="-fPIC -O3 -mllvm -polly" \
          -DCMAKE_CXX_FLAGS="-fPIC -O3 -mllvm -polly" \
          -DJNI=ON \
          -DROCKSDB_BUILD_SHARED=ON \
          -DWITH_GFLAGS=OFF \
          -DWITH_SNAPPY=OFF \
          -DWITH_LZ4=OFF \
          -DWITH_ZLIB=OFF \
          -DWITH_ZSTD=OFF \
          -DCMAKE_BUILD_TYPE=Release \
          ..
        
        # 构建 JNI 库
        cmake --build . --config Release --parallel 6
                
    - name: Archive artifacts
      uses: actions/upload-artifact@main
      with:
        name: rocksdb-android-aarch64-jni
        path: |
          **/librocksdbjni.so
        retention-days: 7
